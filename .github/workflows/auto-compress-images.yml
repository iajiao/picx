name: 自动压缩图片

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装压缩工具
        run: |
          sudo apt-get update
          sudo apt-get install -y optipng jpegoptim webp

      - name: 压缩所有图片
        run: |
          # JPEG 压缩
          find . -type f \( -name "*.jpg" -o -name "*.jpeg" \) -print0 | while IFS= read -r -d '' file; do
            jpegoptim --strip-all --max=85 "$file"
          done
          
          # PNG 压缩
          find . -type f -name "*.png" -print0 | while IFS= read -r -d '' file; do
            optipng -o7 -strip all "$file"
          done
          
          # WebP 压缩
          find . -type f -name "*.webp" -print0 | while IFS= read -r -d '' file; do
            temp_file="${file}.tmp"
            cwebp -q 85 "$file" -o "$temp_file"
            mv "$temp_file" "$file"
          done

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加所有修改的图片
          git add -A -- "*.jpg" "*.jpeg" "*.png" "*.webp"
          
          # 如果有变更才提交
          if ! git diff --cached --quiet; then
            git commit -m "🤖 自动压缩图片"
            git push
          else
            echo "没有图片需要压缩"
          fi
