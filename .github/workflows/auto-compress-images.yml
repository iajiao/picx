name: 自动压缩图片
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装压缩工具
        run: sudo apt-get install -y optipng jpegoptim webp

      - name: 压缩所有图片
        run: |
          find . -type f \( -name "*.jpg" -o -name "*.jpeg" \) -exec jpegoptim --strip-all --max=85 {} \;
          find . -type f -name "*.png" -exec optipng -o7 -strip all {} \;
          find . -type f -name "*.webp" -exec cwebp -q 85 {} -o {} \;

      - name: 提交并推送
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add *.jpg *.jpeg *.png *.webp
          git commit -m "🤖 自动压缩图片" || exit 0
          git push https://${{ github.token }}@github.com/${{ github.repository }}.git HEAD:master
