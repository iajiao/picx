name: 自动压缩图片
on:
  push:
    branches: [ master ]  # 已经改成你的 master 分支
  workflow_dispatch:

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 安装压缩工具
      - name: Install tools
        run: sudo apt-get install -y optipng jpegoptim webp

      # 自动压缩所有图片
      - name: Compress images
        run: |
          find . -type f \( -name "*.jpg" -o -name "*.jpeg" \) -exec jpegoptim --strip-all --max=85 {} \;
          find . -type f -name "*.png" -exec optipng -o7 -strip all {} \;
          find . -type f -name "*.webp" -exec cwebp -q 85 {} -o {} \;

      # 自动提交
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自动压缩图片"
          file_pattern: "*.jpg *.jpeg *.png *.webp"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
